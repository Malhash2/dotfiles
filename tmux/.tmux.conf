set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"
set -g extended-keys on
set -as terminal-features "xterm*:extkeys"

set -g default-shell /opt/homebrew/bin/fish

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind-key -n C-h select-pane -L
bind-key -n C-l select-pane -R
bind-key -n C-k select-pane -U
bind-key -n C-j select-pane -D

bind-key -n C-= resize-pane -R
bind-key -n C-- resize-pane -L
bind-key -n C-S-= resize-pane -D
bind-key -n C-_ resize-pane -U

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin "janoamaral/tokyo-night-tmux"

set -g @continuum-restore 'on'

set -g @tokyo-night-tmux_theme night
set -g @tokyo-night-tmux_transparent 0
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style none
set -g @tokyo-night-tmux_zoom_id_style dsquare

set -g @tokyo-night-tmux_window_tidy_icons 0

set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_date_format DMY
set -g @tokyo-night-tmux_time_format 24H

set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative
set -g @tokyo-night-tmux_show_hostname 0
set -g @tokyo-night-tmux_show_battery_widget 0
set -g @tokyo-night-tmux_show_netspeed 0

set -g renumber-windows on
bind c new-window -c "#{pane_current_path}"

bind -T prefix C-S-l last-window

run -b '~/.tmux/plugins/tpm/tpm'
